name: xue_hua_device_info
description: "Flutter plugin for device info: battery, network, storage, display, and system details. Ported from tauri-plugin-device-info."
version: 1.0.1
homepage: https://github.com/Matkurban/xue_hua_device_info
repository: https://github.com/Matkurban/xue_hua_device_info
issue_tracker: https://github.com/Matkurban/xue_hua_device_info/issues
documentation: https://github.com/Matkurban/xue_hua_device_info/blob/main/README.md

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.flutter_rust_bridge.xue_hua_device_info
        pluginClass: XueHuaDeviceInfoPlugin
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
